name: weekly site update
on:
  schedule:
    - cron: "23 5 * 9-12,1 3"   # Wed 05:23 UTC (Tue night ET), Sep-Jan
  workflow_dispatch:
    inputs:
      draft:
        description: "regenerate the draft board instead of the weekly slate (works preseason)"
        type: boolean
        default: false
env:
  MODEL: transformer
  # comma-separated run roots = the deployed 3-seed ensemble; the predictor
  # appends through{year} to each and averages the quantiles
  ARTIFACT_ROOT: "models/transformer/v1,models/transformer/v1_s43,models/transformer/v1_s44"
  SEASON: "2026"
jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions: { contents: write, actions: write }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e .
      - name: Generate site JSON (fail-safe - any error stops the job, site keeps last data)
        run: |
          ARGS="--out site/data --model $MODEL --season $SEASON"
          if [ "${{ inputs.draft }}" = "true" ]; then ARGS="$ARGS --draft"; else ARGS="$ARGS --week auto"; fi
          if [ -n "$ARTIFACT_ROOT" ]; then ARGS="$ARGS --artifact-root $ARTIFACT_ROOT"; fi
          python -m ffmodel.site.generate $ARGS
      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "weekly-update-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "data: weekly site refresh"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
      - name: Deploy Pages (GITHUB_TOKEN pushes do not fire on-push workflows)
        if: steps.commit.outputs.pushed == 'true'
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh workflow run pages.yml --ref main
